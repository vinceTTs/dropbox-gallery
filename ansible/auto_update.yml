- hosts: raspi
  become: yes
  vars:
    reboot_required_file: /var/run/reboot-required
    script_path: /usr/local/bin/auto-update.sh
    service_path: /etc/systemd/system/auto-update.service
    timer_path: /etc/systemd/system/auto-update.timer
    journald_dropin_dir: /etc/systemd/journald.conf.d
    journald_dropin_file: /etc/systemd/journald.conf.d/90-auto-update-retention.conf
    journald_system_max_use: 200M
    journald_system_keep_free: 100M
    journald_max_retention_sec: 14day

  tasks:
    - name: Ensure auto update script exists
      copy:
        dest: "{{ script_path }}"
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          LOCK_FILE="/var/lock/auto-update.lock"
          exec 9>"$LOCK_FILE"

          if ! flock -n 9; then
            echo "[$(date --iso-8601=seconds)] auto-update already running; exiting"
            exit 0
          fi

          export DEBIAN_FRONTEND=noninteractive

          echo "[$(date --iso-8601=seconds)] auto-update started"
          apt-get -y -qq update
          apt-get -y -qq dist-upgrade
          apt-get -y -qq autoremove
          apt-get -y -qq autoclean

          if [ -f "{{ reboot_required_file }}" ]; then
            echo "[$(date --iso-8601=seconds)] reboot required; scheduling reboot"
            /sbin/shutdown -r +1 "Reboot triggered by auto-update"
          fi

          echo "[$(date --iso-8601=seconds)] auto-update finished"

    - name: Ensure systemd service for auto update exists
      copy:
        dest: "{{ service_path }}"
        mode: '0644'
        content: |
          [Unit]
          Description=Automatic system update via bash script

          [Service]
          Type=oneshot
          ExecStart={{ script_path }}
          Nice=10
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target

    - name: Ensure systemd timer for auto update exists
      copy:
        dest: "{{ timer_path }}"
        mode: '0644'
        content: |
          [Unit]
          Description=Daily automatic system update timer

          [Timer]
          OnCalendar=*-*-* 03:30:00
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: Ensure journald drop-in directory exists
      file:
        path: "{{ journald_dropin_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Configure journald retention limits
      copy:
        dest: "{{ journald_dropin_file }}"
        owner: root
        group: root
        mode: '0644'
        content: |
          [Journal]
          SystemMaxUse={{ journald_system_max_use }}
          SystemKeepFree={{ journald_system_keep_free }}
          MaxRetentionSec={{ journald_max_retention_sec }}
      notify: Restart systemd-journald

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start auto-update timer
      systemd:
        name: auto-update.timer
        enabled: yes
        state: started

  handlers:
    - name: Restart systemd-journald
      systemd:
        name: systemd-journald
        state: restarted
