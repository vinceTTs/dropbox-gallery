---
- name: Configure Dropbox access on Raspberry Pi
  hosts: localhost
  connection: raspi
  become: true

  vars:
    dropbox_remote_name: dropbox
    dropbox_user: "{{ ansible_user | default('raspi') }}"
    dropbox_group: "{{ dropbox_user }}"
    dropbox_home: "/home/{{ dropbox_user }}"
    dropbox_config_dir: "{{ dropbox_home }}/.config/rclone"
    dropbox_config_file: "{{ dropbox_config_dir }}/rclone.conf"
    dropbox_client_id_file: "{{ playbook_dir }}/../credentials/dropbox_key.txt"
    dropbox_client_secret_file: "{{ playbook_dir }}/../credentials/dropbox_secret.txt"
    dropbox_client_id_from_file: "{{ lookup('ansible.builtin.file', dropbox_client_id_file, errors='ignore') | trim }}"
    dropbox_client_secret_from_file: "{{ lookup('ansible.builtin.file', dropbox_client_secret_file, errors='ignore') | trim }}"
    dropbox_client_id_effective: "{{ dropbox_client_id_from_file }}"
    dropbox_client_secret_effective: "{{ dropbox_client_secret_from_file }}"
    dropbox_refresh_token_file: "{{ playbook_dir }}/../credentials/dropbox_refresh_token.txt"
    dropbox_refresh_token_from_file: "{{ lookup('ansible.builtin.file', dropbox_refresh_token_file, errors='ignore') | trim }}"
    dropbox_oauth_token_url: "https://api.dropboxapi.com/oauth2/token"
    dropbox_auth_effective: ""
    dropbox_source_path: ""
    dropbox_copy_enable: true
    dropbox_copy_schedule: "*-*-* 03:00:00"
    dropbox_token_refresh_schedule: "*:0/45"
    dropbox_filter_file: "{{ dropbox_config_dir }}/dropbox-download.filter"
    dropbox_copy_log_file: "{{ dropbox_config_dir }}/dropbox-rclone-copy.log"
    dropbox_sudoers_file: /etc/sudoers.d/90-dropbox-gallery
    dropbox_token_refresh_script: /usr/local/bin/dropbox-refresh-token.py
    dropbox_token_refresh_service_path: /etc/systemd/system/dropbox-token-refresh.service
    dropbox_token_refresh_timer_path: /etc/systemd/system/dropbox-token-refresh.timer
    dropbox_recent_days: 7
    dropbox_min_files: 10
    dropbox_resize_images: true
    dropbox_resize_max_dimension: 1920
    dropbox_filter_patterns:
      - "*.jpg"
      - "*.jpeg"
      - "*.JPG"
      - "*.JPEG"
      - "*.heic"
      - "*.HEIC"
      - "*.mp4"
      - "*.MP4"
      - "*.mov"
      - "*.MOV"
      - "*.m4v"
      - "*.M4V"
    dropbox_mount_point: /mnt/dropbox
    dropbox_enable_mount: false
    dropbox_mount_options:
      - --allow-other
      - --dir-cache-time=72h
      - --vfs-cache-mode=full
      - --vfs-cache-max-age=24h
  pre_tasks:
    - name: Load shared path variables
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/vars/shared_paths.yml"

    - name: Ensure Dropbox app credential files are present
      ansible.builtin.assert:
        that:
          - dropbox_client_id_from_file | length > 0
          - dropbox_client_secret_from_file | length > 0
        fail_msg: >-
          Fehlende Dropbox App-Daten. Lege {{ dropbox_client_id_file }} (client_id)
          und {{ dropbox_client_secret_file }} (client_secret) als Textdateien an.
      no_log: true

    - name: Ensure Dropbox refresh token file is present
      ansible.builtin.assert:
        that:
          - dropbox_refresh_token_from_file | length > 0
        fail_msg: >-
          Kein Dropbox Refresh-Token gefunden. Lege {{ dropbox_refresh_token_file }}
          als Textdatei mit einem gültigen Refresh-Token an.
        success_msg: Dropbox Refresh-Token gefunden.
      no_log: true

    - name: Request short-lived access token from Dropbox refresh token
      ansible.builtin.uri:
        url: "{{ dropbox_oauth_token_url }}"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: refresh_token
          refresh_token: "{{ dropbox_refresh_token_from_file }}"
          client_id: "{{ dropbox_client_id_effective }}"
          client_secret: "{{ dropbox_client_secret_effective }}"
        return_content: true
        status_code: 200
      register: dropbox_oauth_refresh
      no_log: true

    - name: Build Dropbox token payload for rclone
      ansible.builtin.set_fact:
        dropbox_auth_effective: >-
          {{
            {
              'access_token': dropbox_oauth_refresh.json.access_token,
              'token_type': (dropbox_oauth_refresh.json.token_type | default('bearer')),
              'refresh_token': dropbox_refresh_token_from_file
            } | to_json
          }}
      no_log: true

  tasks:
    - name: Install rclone and FUSE packages
      ansible.builtin.apt:
        name:
          - rclone
          - fuse3
          - mpv
          - libheif-examples
          - python3-pil
          - x11-xserver-utils
        state: present

    - name: Ensure rclone config directory exists
      ansible.builtin.file:
        path: "{{ dropbox_config_dir }}"
        state: directory
        owner: "{{ dropbox_user }}"
        group: "{{ dropbox_group }}"
        mode: '0700'

    - name: Write rclone config for Dropbox
      ansible.builtin.copy:
        dest: "{{ dropbox_config_file }}"
        owner: "{{ dropbox_user }}"
        group: "{{ dropbox_group }}"
        mode: '0600'
        content: |
          [{{ dropbox_remote_name }}]
          type = dropbox
          {% if dropbox_client_id_effective | length > 0 %}client_id = {{ dropbox_client_id_effective }}
          {% endif %}{% if dropbox_client_secret_effective | length > 0 %}client_secret = {{ dropbox_client_secret_effective }}
          {% endif %}token = {{ dropbox_auth_effective }}
      no_log: true

    - name: Ensure Dropbox mount directory exists
      ansible.builtin.file:
        path: "{{ dropbox_mount_point }}"
        state: directory
        owner: "{{ dropbox_user }}"
        group: "{{ dropbox_group }}"
        mode: '0755'

    - name: Ensure Dropbox download directory exists
      ansible.builtin.file:
        path: "{{ dropbox_download_dir }}"
        state: directory
        owner: "{{ dropbox_user }}"
        group: "{{ dropbox_group }}"
        mode: '0755'

    - name: Write Dropbox download filter file
      ansible.builtin.copy:
        dest: "{{ dropbox_filter_file }}"
        owner: "{{ dropbox_user }}"
        group: "{{ dropbox_group }}"
        mode: '0600'
        content: |
          {% for pattern in dropbox_filter_patterns %}
          + {{ pattern }}
          {% endfor %}
          - **
      when: dropbox_filter_patterns | length > 0

    - name: Create Dropbox media refresh script
      ansible.builtin.copy:
        dest: /usr/local/bin/dropbox-refresh-media.py
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/usr/bin/env python3
          import json
          import os
          import subprocess
          import sys
          import tempfile
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          REMOTE = {{ dropbox_remote_name | to_json }}
          SOURCE_PATH = {{ dropbox_source_path | to_json }}
          CONFIG_FILE = {{ dropbox_config_file | to_json }}
          FILTER_FILE = {{ dropbox_filter_file | to_json }}
          DOWNLOAD_DIR = Path({{ dropbox_download_dir | to_json }})
          SLIDESHOW_MEDIA_DIR = Path({{ dropbox_slideshow_media_dir | to_json }})
          PLAYLIST_FILE = Path({{ dropbox_playlist_file | to_json }})
          RECENT_DAYS = {{ dropbox_recent_days }}
          MIN_FILES = {{ dropbox_min_files }}
          RESIZE_IMAGES = {{ dropbox_resize_images | ternary('True', 'False') }}
          RESIZE_MAX_DIMENSION = {{ dropbox_resize_max_dimension }}
          IMAGE_SUFFIXES = {".jpg", ".jpeg", ".png", ".bmp", ".webp"}
          HEIC_SUFFIXES = {".heic", ".heif"}

          try:
              from PIL import Image, ImageOps
          except ImportError:
              Image = None
              ImageOps = None

          def remote_spec() -> str:
              return f"{REMOTE}:{SOURCE_PATH}" if SOURCE_PATH else f"{REMOTE}:"

          def parse_modtime(value: str) -> datetime:
              if not value:
                  return datetime.fromtimestamp(0, tz=timezone.utc)
              return datetime.fromisoformat(value.replace("Z", "+00:00"))

          def run_json_command() -> list[dict]:
              cmd = [
                  "rclone",
                  "lsjson",
                  remote_spec(),
                  "--recursive",
                  "--files-only",
                  "--config",
                  CONFIG_FILE,
              ]
              if FILTER_FILE:
                  cmd.extend(["--filter-from", FILTER_FILE])
              result = subprocess.run(cmd, check=True, capture_output=True, text=True)
              return json.loads(result.stdout or "[]")

          def select_files(items: list[dict]) -> list[str]:
              cutoff = datetime.now(timezone.utc) - timedelta(days=RECENT_DAYS)
              sorted_items = sorted(
                  (item for item in items if not item.get("IsDir", False)),
                  key=lambda item: parse_modtime(item.get("ModTime", "")),
                  reverse=True,
              )

              selected: list[str] = []
              selected_set: set[str] = set()

              for item in sorted_items:
                  path = item.get("Path")
                  if not path:
                      continue
                  if parse_modtime(item.get("ModTime", "")) >= cutoff and path not in selected_set:
                      selected.append(path)
                      selected_set.add(path)

              if len(selected) < MIN_FILES:
                  for item in sorted_items:
                      path = item.get("Path")
                      if not path or path in selected_set:
                          continue
                      selected.append(path)
                      selected_set.add(path)
                      if len(selected) >= MIN_FILES:
                          break

              return selected

          def copy_selected_files(selected: list[str]) -> None:
              if not selected:
                  PLAYLIST_FILE.parent.mkdir(parents=True, exist_ok=True)
                  PLAYLIST_FILE.write_text("", encoding="utf-8")
                  print("Keine passenden Medien gefunden.")
                  return

              with tempfile.NamedTemporaryFile("w", delete=False, encoding="utf-8") as handle:
                  handle.write("\n".join(selected))
                  handle.write("\n")
                  files_from_path = handle.name

              try:
                  cmd = [
                      "rclone",
                      "copy",
                      remote_spec(),
                      str(DOWNLOAD_DIR),
                      "--config",
                      CONFIG_FILE,
                      "--files-from",
                      files_from_path,
                      "--no-traverse",
                      "--create-empty-src-dirs",
                  ]
                  subprocess.run(cmd, check=True)
              finally:
                  os.unlink(files_from_path)

          def cleanup_local_files(selected: list[str]) -> None:
              keep = {Path(path).as_posix() for path in selected}
              if DOWNLOAD_DIR.exists():
                  for file_path in sorted(DOWNLOAD_DIR.rglob("*"), reverse=True):
                      if file_path.is_file():
                          rel_path = file_path.relative_to(DOWNLOAD_DIR).as_posix()
                          if rel_path not in keep:
                              file_path.unlink()
                      elif file_path.is_dir():
                          try:
                              file_path.rmdir()
                          except OSError:
                              pass

          def resize_image(source_path: Path, target_path: Path) -> None:
              with Image.open(source_path) as image:
                  image = ImageOps.exif_transpose(image)
                  image.thumbnail((RESIZE_MAX_DIMENSION, RESIZE_MAX_DIMENSION))
                  save_kwargs = {"optimize": True}
                  if target_path.suffix.lower() in {".jpg", ".jpeg"}:
                      if image.mode not in ("RGB", "L"):
                          image = image.convert("RGB")
                      save_kwargs["quality"] = 88
                  image.save(target_path, **save_kwargs)

          def convert_heic(source_path: Path, target_path: Path) -> Path:
              converted_target = target_path.with_suffix(".jpg")
              converted_target.parent.mkdir(parents=True, exist_ok=True)
              subprocess.run(
                  ["heif-convert", str(source_path), str(converted_target)],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              return converted_target

          def create_display_media(selected: list[str]) -> dict[str, str]:
              generated: dict[str, str] = {}
              SLIDESHOW_MEDIA_DIR.mkdir(parents=True, exist_ok=True)

              for rel_path in selected:
                  source_path = DOWNLOAD_DIR / Path(rel_path)
                  target_path = SLIDESHOW_MEDIA_DIR / Path(rel_path)
                  target_path.parent.mkdir(parents=True, exist_ok=True)

                  suffix = source_path.suffix.lower()
                  actual_target = target_path

                  if suffix in HEIC_SUFFIXES:
                      actual_target = convert_heic(source_path, target_path)
                      if RESIZE_IMAGES and Image is not None and ImageOps is not None:
                          resize_image(actual_target, actual_target)
                  elif RESIZE_IMAGES and suffix in IMAGE_SUFFIXES and Image is not None and ImageOps is not None:
                      resize_image(source_path, target_path)
                  else:
                      if actual_target.exists() or actual_target.is_symlink():
                          actual_target.unlink()
                      actual_target.symlink_to(source_path)

                  generated[rel_path] = actual_target.relative_to(SLIDESHOW_MEDIA_DIR).as_posix()

              keep_outputs = set(generated.values())
              if SLIDESHOW_MEDIA_DIR.exists():
                  for file_path in sorted(SLIDESHOW_MEDIA_DIR.rglob("*"), reverse=True):
                      rel_path = file_path.relative_to(SLIDESHOW_MEDIA_DIR).as_posix()
                      if file_path.is_file() or file_path.is_symlink():
                          if rel_path not in keep_outputs:
                              file_path.unlink()
                      elif file_path.is_dir():
                          try:
                              file_path.rmdir()
                          except OSError:
                              pass

              return generated

          def write_playlist(selected: list[str], generated: dict[str, str]) -> None:
              PLAYLIST_FILE.parent.mkdir(parents=True, exist_ok=True)
              with PLAYLIST_FILE.open("w", encoding="utf-8") as handle:
                  for rel_path in selected:
                      local_rel_path = generated.get(rel_path)
                      if not local_rel_path:
                          continue
                      local_path = SLIDESHOW_MEDIA_DIR / Path(local_rel_path)
                      if local_path.exists():
                          handle.write(f"{local_path}\n")

          def main() -> int:
              DOWNLOAD_DIR.mkdir(parents=True, exist_ok=True)
              SLIDESHOW_MEDIA_DIR.mkdir(parents=True, exist_ok=True)
              items = run_json_command()
              selected = select_files(items)
              print(f"Ausgewählte Medien: {len(selected)}")
              copy_selected_files(selected)
              cleanup_local_files(selected)
              generated = create_display_media(selected)
              write_playlist(selected, generated)
              print(f"Playlist geschrieben: {PLAYLIST_FILE}")
              return 0

          if __name__ == "__main__":
              sys.exit(main())

    - name: Create Dropbox reconnect helper script
      ansible.builtin.copy:
        dest: /usr/local/bin/dropbox-reconnect.sh
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/bin/bash
          set -euo pipefail

          exec rclone config reconnect {{ dropbox_remote_name }}: --config {{ dropbox_config_file }}

    - name: Create Dropbox authorize helper script
      ansible.builtin.copy:
        dest: /usr/local/bin/dropbox-authorize.sh
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/bin/bash
          set -euo pipefail

          CLIENT_ID="{{ dropbox_client_id_effective }}"
          CLIENT_SECRET="{{ dropbox_client_secret_effective }}"
          REFRESH_TOKEN_FILE_DEFAULT="{{ dropbox_refresh_token_file }}"
          REFRESH_TOKEN_FILE="${1:-$REFRESH_TOKEN_FILE_DEFAULT}"

          if [ -z "$CLIENT_ID" ] || [ -z "$CLIENT_SECRET" ]; then
            echo "Fehlende Dropbox App-Daten. Lege {{ dropbox_client_id_file }} und {{ dropbox_client_secret_file }} als Textdateien an." >&2
            exit 1
          fi

          TOKEN_JSON="$(rclone authorize dropbox "$CLIENT_ID" "$CLIENT_SECRET")"

          REFRESH_TOKEN="$(printf '%s' "$TOKEN_JSON" | /usr/bin/python3 -c "import json,re,sys; raw=sys.stdin.read().strip(); m=re.search(r'\\{.*\\}', raw, re.S); sys.exit(1) if not m else None; token=json.loads(m.group(0)).get('refresh_token',''); sys.exit(2) if not token else None; print(token)")"

          mkdir -p "$(dirname "$REFRESH_TOKEN_FILE")"
          printf '%s\n' "$REFRESH_TOKEN" > "$REFRESH_TOKEN_FILE"
          chmod 600 "$REFRESH_TOKEN_FILE"

          echo "Refresh-Token gespeichert in: $REFRESH_TOKEN_FILE"
          echo "Danach ausführen: ansible-playbook ansible/dropbox.yml -i inventory-remote.ini -K"

    - name: Create Dropbox copy script
      ansible.builtin.copy:
        dest: /usr/local/bin/dropbox-copy.sh
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/bin/bash
          set -euo pipefail

          mkdir -p "$(dirname "{{ dropbox_copy_log_file }}")"

          {
            echo "[$(date --iso-8601=seconds)] Starte Dropbox-Medienaktualisierung"
            /usr/bin/python3 /usr/local/bin/dropbox-refresh-media.py
            echo "[$(date --iso-8601=seconds)] Dropbox-Medienaktualisierung abgeschlossen"
          } >> "{{ dropbox_copy_log_file }}" 2>&1
      when: dropbox_copy_enable | bool

    - name: Create Dropbox token refresh script
      ansible.builtin.copy:
        dest: "{{ dropbox_token_refresh_script }}"
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/usr/bin/env python3
          import argparse
          import json
          import pathlib
          import re
          import sys
          import urllib.parse
          import urllib.request


          def read_section_lines(lines, remote_name):
              section_start = None
              section_end = len(lines)
              target = f"[{remote_name}]"

              for idx, line in enumerate(lines):
                  if line.strip() == target:
                      section_start = idx + 1
                      break

              if section_start is None:
                  raise RuntimeError(f"Remote section not found: {target}")

              for idx in range(section_start, len(lines)):
                  if lines[idx].lstrip().startswith("["):
                      section_end = idx
                      break

              return section_start, section_end


          def get_key_value(lines, start, end, key):
              pattern = re.compile(rf"^\s*{re.escape(key)}\s*=\s*(.*)$")
              for idx in range(start, end):
                  match = pattern.match(lines[idx])
                  if match:
                      return idx, match.group(1).strip()
              return None, ""


          def main():
              parser = argparse.ArgumentParser()
              parser.add_argument("--config", required=True)
              parser.add_argument("--remote", required=True)
              parser.add_argument("--token-url", required=True)
              args = parser.parse_args()

              config_path = pathlib.Path(args.config)
              if not config_path.exists():
                  raise RuntimeError(f"Config file not found: {config_path}")

              lines = config_path.read_text(encoding="utf-8").splitlines(True)
              start, end = read_section_lines(lines, args.remote)

              _, client_id = get_key_value(lines, start, end, "client_id")
              _, client_secret = get_key_value(lines, start, end, "client_secret")
              token_idx, token_raw = get_key_value(lines, start, end, "token")

              if not client_id or not client_secret:
                  raise RuntimeError("client_id/client_secret missing in rclone config")
              if token_idx is None or not token_raw:
                  raise RuntimeError("token missing in rclone config")

              token_obj = json.loads(token_raw)
              refresh_token = token_obj.get("refresh_token", "")
              if not refresh_token:
                  raise RuntimeError("refresh_token missing in token JSON")

              body = urllib.parse.urlencode(
                  {
                      "grant_type": "refresh_token",
                      "refresh_token": refresh_token,
                      "client_id": client_id,
                      "client_secret": client_secret,
                  }
              ).encode("utf-8")

              req = urllib.request.Request(args.token_url, data=body, method="POST")
              with urllib.request.urlopen(req, timeout=30) as resp:
                  payload = json.loads(resp.read().decode("utf-8"))

              access_token = payload.get("access_token", "")
              if not access_token:
                  raise RuntimeError("No access_token returned by Dropbox OAuth endpoint")

              updated_token = json.dumps(
                  {
                      "access_token": access_token,
                      "token_type": payload.get("token_type", "bearer"),
                      "refresh_token": refresh_token,
                  },
                  separators=(",", ":"),
              )

              lines[token_idx] = f"token = {updated_token}\n"
              tmp_path = config_path.with_suffix(config_path.suffix + ".tmp")
              tmp_path.write_text("".join(lines), encoding="utf-8")
              tmp_path.replace(config_path)

              print("Dropbox access token refreshed successfully")


          if __name__ == "__main__":
              try:
                  main()
              except Exception as exc:
                  print(f"ERROR: {exc}", file=sys.stderr)
                  sys.exit(1)

    - name: Create systemd service for Dropbox token refresh
      ansible.builtin.copy:
        dest: "{{ dropbox_token_refresh_service_path }}"
        mode: '0644'
        content: |
          [Unit]
          Description=Refresh Dropbox access token via refresh token
          Wants=network-online.target
          After=network-online.target

          [Service]
          Type=oneshot
          User={{ dropbox_user }}
          Group={{ dropbox_group }}
          ExecStart={{ dropbox_token_refresh_script }} --config {{ dropbox_config_file }} --remote {{ dropbox_remote_name }} --token-url {{ dropbox_oauth_token_url }}
          Nice=10
          StandardOutput=journal
          StandardError=journal

    - name: Create systemd timer for Dropbox token refresh
      ansible.builtin.copy:
        dest: "{{ dropbox_token_refresh_timer_path }}"
        mode: '0644'
        content: |
          [Unit]
          Description=Periodically refresh Dropbox access token

          [Timer]
          OnCalendar={{ dropbox_token_refresh_schedule }}
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: Enable and start Dropbox token refresh timer
      ansible.builtin.systemd:
        name: dropbox-token-refresh.timer
        enabled: true
        state: started
        daemon_reload: true

    - name: Allow passwordless sudo for frequent Dropbox operations
      ansible.builtin.copy:
        dest: "{{ dropbox_sudoers_file }}"
        owner: root
        group: root
        mode: '0440'
        validate: /usr/sbin/visudo -cf %s
        content: |
          Cmnd_Alias DROPBOX_GALLERY_CMDS = /usr/local/bin/dropbox-authorize.sh, /usr/local/bin/dropbox-reconnect.sh, /usr/bin/systemctl start dropbox-rclone-copy.service, /usr/bin/systemctl restart dropbox-rclone-copy.timer, /usr/bin/systemctl status dropbox-rclone-copy.service, /usr/bin/systemctl start dropbox-token-refresh.service, /usr/bin/systemctl status dropbox-token-refresh.service
          {{ dropbox_user }} ALL=(root) NOPASSWD: DROPBOX_GALLERY_CMDS

    - name: Test Dropbox connection
      ansible.builtin.command:
        argv:
          - rclone
          - lsd
          - "{{ dropbox_remote_name }}:"
          - --config
          - "{{ dropbox_config_file }}"
      become_user: "{{ dropbox_user }}"
      changed_when: false
      register: dropbox_test

    - name: Create systemd service for Dropbox copy
      ansible.builtin.copy:
        dest: /etc/systemd/system/dropbox-rclone-copy.service
        mode: '0644'
        content: |
          [Unit]
          Description=Download selected files from Dropbox via rclone copy
          Wants=network-online.target
          After=network-online.target

          [Service]
          Type=oneshot
          User={{ dropbox_user }}
          Group={{ dropbox_group }}
          ExecStart=/usr/local/bin/dropbox-copy.sh
      when: dropbox_copy_enable | bool

    - name: Create systemd timer for Dropbox copy
      ansible.builtin.copy:
        dest: /etc/systemd/system/dropbox-rclone-copy.timer
        mode: '0644'
        content: |
          [Unit]
          Description=Run Dropbox download once per day

          [Timer]
          OnCalendar={{ dropbox_copy_schedule }}
          Persistent=true

          [Install]
          WantedBy=timers.target
      when: dropbox_copy_enable | bool

    - name: Enable and start Dropbox copy timer
      ansible.builtin.systemd:
        name: dropbox-rclone-copy.timer
        enabled: true
        state: started
        daemon_reload: true
      when: dropbox_copy_enable | bool

    - name: Create systemd service for Dropbox mount
      ansible.builtin.copy:
        dest: /etc/systemd/system/dropbox-rclone.service
        mode: '0644'
        content: |
          [Unit]
          Description=Dropbox mount via rclone
          Wants=network-online.target
          After=network-online.target

          [Service]
          Type=simple
          User={{ dropbox_user }}
          Group={{ dropbox_group }}
          ExecStart=/usr/bin/rclone mount {{ dropbox_remote_name }}: {{ dropbox_mount_point }} --config {{ dropbox_config_file }} {{ dropbox_mount_options | join(' ') }}
          ExecStop=/bin/fusermount3 -uz {{ dropbox_mount_point }}
          Restart=on-failure
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
      when: dropbox_enable_mount | bool

    - name: Enable and start Dropbox mount service
      ansible.builtin.systemd:
        name: dropbox-rclone.service
        enabled: true
        state: started
        daemon_reload: true
      when: dropbox_enable_mount | bool

    - name: Print Dropbox status
      ansible.builtin.debug:
        msg:
          - "Dropbox wurde mit rclone konfiguriert."
          - "Remote: {{ dropbox_remote_name }}:"
          - "Config: {{ dropbox_config_file }}"
          - "Download aktiv: {{ dropbox_copy_enable }}"
          - "Dropbox-Quelle: {{ dropbox_remote_name }}:{{ dropbox_source_path }}"
          - "Download-Ziel: {{ dropbox_download_dir }}"
          - "Anzeige-Medien: {{ dropbox_slideshow_media_dir }}"
          - "Slideshow-Playlist: {{ dropbox_playlist_file }}"
          - "Letzte Tage bevorzugt: {{ dropbox_recent_days }}"
          - "Mindestens Dateien: {{ dropbox_min_files }}"
          - "Bilder lokal verkleinern: {{ dropbox_resize_images }} (max {{ dropbox_resize_max_dimension }} px)"
          - "Zeitplan: {{ dropbox_copy_schedule }}"
          - "Manueller Einmal-Start: sudo systemctl start dropbox-rclone-copy.service"
          - "Access-Token wird mit Refresh-Token automatisch erneuert."
          - "Refresh-Token-Datei: {{ dropbox_refresh_token_file }}"
          - "Token-Refresh Service manuell: sudo systemctl start dropbox-token-refresh.service"
          - "Token-Refresh Logs: sudo journalctl -u dropbox-token-refresh.service -n 100 --no-pager"
          - "Neuen Refresh-Token erzeugen und speichern: sudo /usr/local/bin/dropbox-authorize.sh [optionaler-zielpfad]"
          - "Gallery-Setup ausführen: ansible-playbook ansible/gallery.yml -i inventory-remote.ini -K"
          - "Log-Datei: {{ dropbox_copy_log_file }}"
          - "Filter: {{ (dropbox_filter_patterns | join(', ')) if (dropbox_filter_patterns | length > 0) else 'kein Filter' }}"
          - "Mount aktiv: {{ dropbox_enable_mount }}"
          - "Mount-Pfad: {{ dropbox_mount_point }}"
